<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Офлайн</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0f;
      color: #f0f0f0;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    main {
      max-width: 480px;
      text-align: center;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: #111118;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }
    p {
      margin: 0 0 8px;
      color: #a0a0b0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Сейчас офлайн</h1>
    <p>Нет доступа к сети. Приложение продолжит работу с кэшированными данными.</p>
    <p>Подключись к интернету и обнови страницу для синхронизации.</p>
  </main>
</body>
</html>
