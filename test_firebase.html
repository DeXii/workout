<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Firebase Test</title>
</head>
<body>
  <h1>Firebase Connection Test</h1>
  <div id="status">Testing...</div>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script>
    const config = {
      apiKey: "AIzaSyDtt9WdE8iIpPOoZ1Ozt4a3ssL2UNoDdb4",
      authDomain: "workout-main.firebaseapp.com",
      databaseURL: "https://workout-main-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "workout-main"
    };
    
    try {
      firebase.initializeApp(config);
      const db = firebase.database();
      
      // Test connection
      const connectedRef = db.ref('.info/connected');
      connectedRef.on('value', (snap) => {
        const status = document.getElementById('status');
        if (snap.val() === true) {
          status.innerHTML = '<span style="color:green">✅ Firebase Connected!</span>';
          status.innerHTML += '<br>Database URL: ' + config.databaseURL;
        } else {
          status.innerHTML = '<span style="color:red">❌ Firebase Disconnected</span>';
        }
      });
      
      // Try to read/write test data
      const testRef = db.ref('test_connection');
      testRef.set({ timestamp: firebase.database.ServerValue.TIMESTAMP })
        .then(() => {
          status.innerHTML += '<br><span style="color:blue">✓ Write test successful</span>';
        })
        .catch(err => {
          status.innerHTML += '<br><span style="color:orange">⚠ Write error: ' + err.message + '</span>';
        });
        
    } catch (e) {
      document.getElementById('status').innerHTML = '<span style="color:red">❌ Error: ' + e.message + '</span>';
    }
  </script>
</body>
</html>
